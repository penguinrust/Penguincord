name: Release
on:
    push:
        branches:
            - main
env:
    FORCE_COLOR: true
    GH_TOKEN: ${{ github.token }}
permissions:
    contents: write
jobs:
    Build:
        name: Build Penguincord
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Build
              run: pnpm buildStandalone
            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generatePenguincordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json
            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release
                  cp *.{json,asar} release
                  cp desktop/* release
                  for file in equibop/*; do
                    filename=$(basename "$file")
                    cp "$file" "release/equibop${filename^}"
                  done
                  find release -size 0 -delete
                  rm release/package.json
                  rm release/*.map
            - name: Create or update release
              run: |
                  if gh release view latest >/dev/null 2>&1; then
                      echo "Release 'latest' exists, uploading files..."
                  else
                      echo "Creating release 'latest'..."
                      gh release create latest --title "Penguincord Latest" --notes "Automated release" --generate-notes
                  fi
            - name: Upload to latest release
              run: |
                  gh release upload latest --clobber dist/release/*
